schema_version: "1.0"
workflow:
  id: "speckit-quality"
  name: "Speckit Quality Gates"
  version: "1.0.0"
  author: "sjors"
  description: "Runs post-implementation quality gates: verify-tasks → verify → review → cleanup → sync → sync-conflicts → retro → checkpoint."

inputs:
  integration:
    type: string
    default: "codex"
    prompt: "Integration to use (e.g. codex, claude, copilot, gemini)"

steps:
  - id: verify-tasks
    type: prompt
    prompt: "Spawn the speckit-verify agent with mode: tasks in a fresh context. The agent must write specs/<feature>/verify-tasks-report.md before this step completes. Pass spec ID, path to tasks.md and spec.md, and the implementation branch or changed files."

  - id: verify
    type: prompt
    prompt: "Spawn the speckit-verify agent with mode: requirements in a fresh context. The agent must write specs/<feature>/verify-report.md before this step completes. Pass spec ID, paths to spec.md, plan.md, and tasks.md, and the implementation directories."

  - id: review
    command: speckit.review.run
    integration: "{{ inputs.integration }}"

  - id: qa
    command: speckit.qa.run
    integration: "{{ inputs.integration }}"

  - id: review-findings
    type: gate
    message: "Review verification, review, and QA findings before cleanup and drift analysis."
    options: [approve, reject]
    on_reject: abort

  - id: cleanup
    command: speckit.cleanup.run
    integration: "{{ inputs.integration }}"

  - id: sync
    command: speckit.sync.analyze
    integration: "{{ inputs.integration }}"

  - id: sync-conflicts
    command: speckit.sync.conflicts
    integration: "{{ inputs.integration }}"

  - id: retro
    command: speckit.retro.run
    integration: "{{ inputs.integration }}"

  - id: review-closeout
    type: gate
    message: "Review cleanup, drift, conflicts, and retrospective outputs before the final checkpoint."
    options: [approve, reject]
    on_reject: abort

  - id: checkpoint-final
    type: prompt
    prompt: "Commit all post-implementation artifacts (verify reports, review report, QA report, cleanup, retro) with a conventional commit message. Tag this as the final feature checkpoint."
