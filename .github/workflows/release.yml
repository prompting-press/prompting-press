      #   run: cargo publish -p prompting-press-core && cargo publish -p prompting-press
      #   env:
      #     CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # --- Python (PyPI via maturin) ---
