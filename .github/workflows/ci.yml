# CI workflow for Prompting Press — spec 001 "Foundations" (US4, T028–T030a).
#
# Design principle: gate LOGIC lives in moon tasks / scripts so every check is
# locally runnable via `mise exec -- moon run ...`. This workflow is a thin caller.
#
# Gate split (OS-sensitivity):
#   gates job  — OS-INDEPENDENT checks (metadata/text/determinism). Single runner:
#                ubuntu-latest (canonical; freshness MUST be single-runner to avoid
#                rustfmt/EOL drift across OSes).
#                  T030a  ci:check-floating-versions
#                  T028   ci:check-ffi
#                  T030   schemas:check-schema
#                  T030   schemas:validate-fixtures
#                  T029   schemas:codegen-check
#
#   build job  — OS-SENSITIVE: `cargo build --workspace` exercises the FFI link
#                paths that differ per OS (pyo3 cdylib on macOS needs
#                -undefined dynamic_lookup; Windows needs the Python import lib).
#                Matrix: ubuntu-latest, macos-latest, windows-latest.
#
# Path-filter gating (issue #13): a `changes` job (always runs, ubuntu, no heavy
# deps) uses dorny/paths-filter to detect which areas changed. Heavy jobs gate
# their expensive STEPS on the relevant `changes` outputs. Required check names
# are PRESERVED — all required jobs always run (step-level gating only) — so
# GitHub always receives a conclusion and the merge queue never stalls on a
# "missing" check. On merge_group every condition also fires via the
# `|| github.event_name == 'merge_group'` guard: the queue is the final
# pre-merge gate and must exercise the full suite.

on:
  push:
  pull_request:
  # merge_group: run the SAME required checks inside GitHub's merge queue, so a
  # PR is tested against the prospective post-merge state of `main` (with any
  # other queued PRs) BEFORE it lands. This is the pre-merge gate that catches
  # "each PR was green but the combination is red" — lockfile drift, dep
  # interactions, stale generated files. Requires enabling the merge queue +
  # marking these jobs as required checks in `main`'s branch protection (a repo
  # Settings change; see docs/ci.md). Job names are identical across pull_request
  # and merge_group, so the queue's check-name matching is satisfied.
  merge_group:

# Least-privilege token: read-only repository access is sufficient for all gates
# and build steps. No deployment or package publish occurs in this workflow.
permissions:
  contents: read

# Cancel superseded in-progress runs on the same ref (e.g. rapid PR re-pushes).
# EXCEPTION: merge_group. The queue re-triggers CI on the SAME ephemeral queue
# branch (refs/heads/gh-readonly-queue/main/pr-N-…), so a ref-keyed group with
# cancel-in-progress cancelled the queue's own CI run — a `cancelled` run is not
# `success`, so the required checks never all reported green at once and the queue
# ejected the PR (observed on #231). For merge_group we therefore make the group
# UNIQUE per run (append run_id) so nothing cancels it; for push/pull_request the
# ref-keyed group + cancellation still culls redundant re-pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'merge_group' && github.run_id || '' }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  # ---------------------------------------------------------------------------
  # changes — Lightweight path-filter job (always runs, no heavy deps). Emits
  # boolean outputs consumed by downstream job step conditions to skip work that
  # a change does not affect (issue #13).
  #
  # Filter rationale:
  #   rust    — Rust crates + workspace manifests + toolchain. Clippy and the
  #             build matrix gate on this directly.
  #   python  — python binding + rust (wheel embeds the core; a Rust change
  #             requires a Python rebuild).
  #   node    — typescript binding + rust (addon embeds the core; a Rust change
  #             requires a Node rebuild).
  #   schema  — JSON Schema definitions. Drives codegen + fixture validation in
  #             gates.
  #   docs    — docs/site content, including committed API-ref pages. A change
  #             here may indicate that a freshness regeneration is needed.
  #   samples — docs/site/samples + top-level samples/; changes here drive the
  #             docs:test-samples and samples:test gates.
  #   ci      — .github/workflows, moon tasks, mise config, CI scripts. Any
  #             tooling change can affect any job — runs the full suite.
  #
  # Anti-hang guarantee: required check names are preserved. All required jobs
  # always run (step-level gating only); GitHub always receives a conclusion so
  # the merge queue never waits for a "missing" required check.
  #
  # merge_group safety: every consuming condition also matches on
  # `github.event_name == 'merge_group'`, making the merge queue exhaustive
  # regardless of what paths-filter computes from the queue diff.
  # ---------------------------------------------------------------------------
  changes:
    name: 'Detect changed paths'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      node: ${{ steps.filter.outputs.node }}
      schema: ${{ steps.filter.outputs.schema }}
      docs: ${{ steps.filter.outputs.docs }}
      samples: ${{ steps.filter.outputs.samples }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # paths-filter needs full history to diff against the base ref

      - name: 'Detect path changes'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain*.toml'
            python:
              # python binding embeds the core; Rust changes also require python rebuild
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain*.toml'
              - 'packages/python/**'
            node:
              # node binding embeds the core; Rust changes also require node rebuild
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain*.toml'
              - 'packages/typescript/**'
            schema:
              - 'schemas/**'
            docs:
              - 'docs/site/**'
            samples:
              - 'docs/site/samples/**'
              - 'samples/**'
            ci:
              # Any workflow, task runner, toolchain, or CI script change can affect
              # any job — conservatively marks all downstream work as needed.
              - '.github/workflows/**'
              - '.moon/**'
              - '**/moon.yml'
              - 'mise.toml'
              - 'ci/**'
              - 'scripts/ci/**'

  # ---------------------------------------------------------------------------
  # pr-gate — FAST, no-compile checks (single runner). Everything here reads
  # manifests / lockfiles / dependency metadata and NEVER invokes `cargo build`,
  # a maturin wheel build, or a napi addon build. Split out from `gates` so a PR
  # fails early (usually under a minute) on a license, advisory, FFI-isolation,
  # or version-pinning regression without waiting on the toolchain-heavy freshness
  # checks or the build/test/conformance jobs.
  #
  # Gate logic lives in moon tasks (locally runnable via `mise exec -- moon run`).
  # Cheap checks that moved here from `gates`: floating-versions, ffi, and the
  # three advisory scans. New here: the license trio + third-party attribution.
  #
  # NOT here (kept in `gates`, they need compilation/codegen toolchains): the
  # schema + codegen freshness checks (rustfmt + the three codegen toolchains) and
  # the API-ref freshness gate (builds the node addon + runs nightly rustdoc).
  #
  # Path-filter note: pr-gate does NOT depend on `changes` — it is already fast
  # (~1-2 min) and always useful for lockfile CVE/license scans regardless of what
  # changed. Running it unconditionally preserves its "early fail" guarantee.
  # ---------------------------------------------------------------------------
  pr-gate:
    name: 'PR gate — cheap checks (ubuntu)'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # let moon resolve the base branch on pull_request events

      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          experimental: true

      # Cache the pnpm store + uv cache across runs (keyed on the lockfiles). A
      # missing path or key-miss is a harmless no-op restore, so it can never
      # break a job — it only speeds up the pnpm/uv installs below.
      - name: 'Cache pnpm + uv stores'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/uv
          key: pnpm-uv-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/uv.lock') }}
          restore-keys: |
            pnpm-uv-${{ runner.os }}-

      # cargo-about (third-party attribution) and `cargo tree` (FFI gate) harvest
      # each crate's extracted source from the registry cache; `cargo fetch
      # --locked` populates it WITHOUT compiling. cargo-deny's license check reads
      # only Cargo.lock, so it needs nothing extra.
      - name: 'Fetch crate sources (no build)'
        run: mise exec -- cargo fetch --locked

      # The Node advisory + Node license gates + the biome lint read the installed
      # node_modules / pnpm-lock. Frozen + hermetic; no addon build.
      - name: 'Install TS deps (pnpm)'
        run: mise exec -- pnpm -C packages/typescript install --frozen-lockfile

      # rustfmt is needed by the `cargo fmt --check` gate below. mise-action caches
      # ~/.local/share/mise but NOT ~/.rustup, so on a cache hit the component can
      # be absent even though rust is "installed". `rustup component add` is
      # idempotent and targets the mise-active toolchain (mirrors the gates job).
      - name: 'Ensure rustfmt component'
        run: mise exec -- rustup component add rustfmt

      # --- structural invariants (no compile) ---
      - name: 'Floating-version lint (SEC-003)'
        run: mise exec -- moon run ci:check-floating-versions
      - name: 'FFI isolation (Principle II / C-02)'
        run: mise exec -- moon run ci:check-ffi

      # --- lint / format (static analysis, no compile) ---
      - name: 'Lint: Rust (cargo fmt --check)'
        run: mise exec -- moon run ci:check-fmt
      - name: 'Lint: Python (ruff)'
        run: mise exec -- moon run ci:check-lint-py
      - name: 'Lint: Node/TS (biome)'
        run: mise exec -- moon run prompting-press-typescript:lint
      - name: 'Lint: GitHub workflows (actionlint)'
        run: mise exec -- moon run ci:check-workflows
      - name: 'Lint: shell scripts (shellcheck)'
        run: mise exec -- moon run ci:check-scripts

      # --- dead code / unused dependencies (static analysis, no compile) ---
      - name: 'Unused deps: Rust (cargo-machete)'
        run: mise exec -- moon run ci:check-unused-deps
      - name: 'Dead code: Node/TS (knip)'
        run: mise exec -- moon run prompting-press-typescript:knip

      # --- license policy: Apache-2.0 compatibility (one gate per ecosystem) ---
      - name: 'License gate: Rust (cargo-deny)'
        run: mise exec -- moon run ci:check-licenses
      - name: 'License gate: Python (pip-licenses)'
        run: mise exec -- moon run ci:check-licenses-py
      - name: 'License gate: Node (package.json scan)'
        run: mise exec -- moon run ci:check-licenses-node
      # --- supply-chain advisories (known CVEs; lockfile scans) ---
      - name: 'Advisory scan: Rust (cargo-deny)'
        run: mise exec -- moon run ci:check-advisories
      - name: 'Advisory scan: Python (pip-audit)'
        run: mise exec -- moon run ci:check-advisories-py
      - name: 'Advisory scan: Node (pnpm audit)'
        run: mise exec -- moon run ci:check-advisories-node

  # ---------------------------------------------------------------------------
  # gates — OS-independent freshness/determinism checks that DO need a toolchain
  # (rustfmt + the three codegen chains; nightly rustdoc + the built node addon
  # for API refs). The cheap no-compile checks live in `pr-gate` above.
  #
  # Path-filter gating: setup steps always run (cheap); the actual check steps
  # are gated at step level:
  #   schema/codegen group — runs when schema, rust, or ci changed
  #   API-ref group        — runs when rust, node, python, docs, or ci changed
  # The job always completes, so the required check always reports green.
  # ---------------------------------------------------------------------------
  gates:
    name: 'Gates (ubuntu)'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # moon's affected-project detection resolves the base branch (`main`) to
          # scope/hash tasks. The default shallow `fetch-depth: 1` has no base ref:
          # fine on `push` (the branch itself resolves) but on `pull_request` the
          # checkout is a detached merge ref with no local `main` → moon's
          # `git … main` fails with exit 128. Full history makes the base resolvable.
          fetch-depth: 0

      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          experimental: true

      - name: 'Cache pnpm + uv stores'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/uv
          key: pnpm-uv-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/uv.lock') }}
          restore-keys: |
            pnpm-uv-${{ runner.os }}-

      # Ensure the rust toolchain's components (rustfmt/clippy) are present.
      # mise-action caches ~/.local/share/mise but NOT ~/.rustup, where rustup
      # stores the toolchain + components. On a cache hit, `mise install`
      # short-circuits ("all tools installed") and ~/.rustup is not restored, so
      # rustfmt can be absent even though mise reports rust installed — which
      # breaks the Rust :codegen step (rustfmt) that schemas:codegen-check runs.
      # `rustup component add` is idempotent and targets the mise-active toolchain
      # (RUSTUP_TOOLCHAIN=1.95.0). This is the robust fix for the cache-hit path;
      # the mise.toml `components` pin covers the cache-miss / fresh-install path.
      - name: 'Ensure rust components (rustfmt/clippy)'
        run: mise exec -- rustup component add rustfmt clippy

      # Expose the mise-managed cargo/rustc on PATH so Swatinem/rust-cache (a JS
      # action that shells out to `rustc -vV` for its cache key) can find them
      # without a `mise exec` prefix. `mise which cargo` resolves the active shim.
      - name: 'Expose Rust on PATH (for rust-cache)'
        shell: bash
        run: dirname "$(mise which cargo)" >> "$GITHUB_PATH"
      - name: 'Rust build cache'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: gates-v2

      # Install TypeScript workspace deps so json-schema-to-typescript is present
      # when schemas:codegen-check regenerates the TS shape. On a cold checkout
      # node_modules is absent (gitignored); pnpm --frozen-lockfile is hermetic.
      - name: 'Install TS deps (pnpm)'
        run: mise exec -- pnpm -C packages/typescript install --frozen-lockfile

      # Sync Python codegen toolchain from hash-pinned uv.lock (SEC-001/002).
      # uv is available via mise (installed above). --frozen enforces lockfile integrity.
      - name: 'Install Python codegen deps (uv)'
        run: mise exec -- uv sync --project packages/python --group codegen --no-install-project --frozen

      # NOTE: the floating-version lint, FFI-isolation gate, and the three
      # advisory scans MOVED to the `pr-gate` job (they need no compilation, so
      # they belong in the fast early-fail gate). This job keeps only the
      # freshness/determinism checks that require a toolchain.

      # T030 — Schema meta-validation (FR-008)
      # Gated: schema, rust, or CI tooling changed.
      - name: 'T030: Schema check'
        if: >-
          needs.changes.outputs.schema == 'true' ||
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- moon run schemas:check-schema

      # T030 — Fixture accept/reject contract (FR-013)
      - name: 'T030: Fixture validation'
        if: >-
          needs.changes.outputs.schema == 'true' ||
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- moon run schemas:validate-fixtures

      # T029 — Codegen freshness / determinism (SC-003)
      - name: 'T029: Codegen freshness'
        if: >-
          needs.changes.outputs.schema == 'true' ||
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- moon run schemas:codegen-check

      # T015 (spec 011) — API-ref freshness gate.
      # Requires: nightly rustdoc (provided by mise via rust-toolchain-nightly.toml),
      # uv (provided by mise), and docs/site pnpm deps (TypeDoc).
      # The nightly toolchain is installed by mise-action above alongside the
      # stable toolchain; the gate script shells out to `node gen-api-refs.mjs`
      # which runs the three extractors (TS/Python/Rust) then checks git diff.
      # Gated: Rust, node, python, docs content, or CI tooling changed.
      - name: 'Install docs/site deps (pnpm)'
        if: >-
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.node == 'true' ||
          needs.changes.outputs.python == 'true' ||
          needs.changes.outputs.docs == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- pnpm -C docs/site install --frozen-lockfile

      # The TS extractor reads packages/typescript/index.d.ts (the napi-emitted
      # type surface) to render the TypeScript API reference at its full fidelity
      # (class/interface forms, NAPI re-export field types). The committed pages
      # were generated with the addon built; the freshness gate must regenerate
      # against the SAME input or it diverges on the napi symbols. So build the
      # addon (which emits index.d.ts) BEFORE the gate runs. This mirrors how the
      # Rust (nightly rustdoc JSON) and Python (griffe) extractor inputs are made
      # available to the gate above.
      - name: 'Build node addon for API-ref extraction (spec 011)'
        if: >-
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.node == 'true' ||
          needs.changes.outputs.python == 'true' ||
          needs.changes.outputs.docs == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- pnpm -C packages/typescript run build:addon

      - name: 'T015: API-ref freshness (spec 011)'
        if: >-
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.node == 'true' ||
          needs.changes.outputs.python == 'true' ||
          needs.changes.outputs.docs == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- bash docs/site/scripts/check-api-refs-fresh.sh

  # ---------------------------------------------------------------------------
  # test-python — spec 004 (review I1): build the prompting-press-py extension
  # and run BOTH binding test suites. The `build` matrix only `cargo build`s the
  # workspace (catching link regressions) and never runs tests, so without this
  # job the 56 pytest + 30 binding tests — the only coverage for the
  # validate-in-Python path, the SEC-004-PY scrub, and loader parity — can rot
  # green. One Linux leg: the suites are OS-independent (the FFI link itself is
  # covered per-OS by the `build` matrix); a venv build on every OS would be
  # costly for no extra coverage of the test logic.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # clippy — Rust lint gate (`cargo clippy … -D warnings`). It COMPILES, so it is
  # its own job rather than a step in the no-compile pr-gate. Needs Python 3.12 on
  # the runner because prompting-press-py is pyo3 `abi3-py312` (pyo3's build script
  # refuses an interpreter older than the abi3 floor) — mirrors the `build` job.
  #
  # Path-filter gating: setup steps always run; the clippy step is gated on rust
  # or CI tooling changes. The job always completes (required check always reports).
  # ---------------------------------------------------------------------------
  clippy:
    name: 'Clippy (ubuntu)'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # let moon resolve the base branch on pull_request events

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          experimental: true

      - name: 'Ensure clippy component'
        run: mise exec -- rustup component add clippy

      - name: 'Expose Rust on PATH (for rust-cache)'
        shell: bash
        run: dirname "$(mise which cargo)" >> "$GITHUB_PATH"
      - name: 'Rust build cache'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: clippy-v2

      - name: 'Clippy (-D warnings)'
        if: >-
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- moon run ci:check-clippy
        env:
          CARGO_TERM_COLOR: always

  test-python:
    name: 'Python binding tests (ubuntu)'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # let moon resolve the base branch on pull_request events

      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          experimental: true

      - name: 'Expose Rust on PATH (for rust-cache)'
        shell: bash
        run: dirname "$(mise which cargo)" >> "$GITHUB_PATH"
      - name: 'Rust build cache'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: test-python-v2
      - name: 'Cache pnpm + uv stores'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/uv
          key: pnpm-uv-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/uv.lock') }}
          restore-keys: |
            pnpm-uv-${{ runner.os }}-

      # rustfmt/clippy not needed here; the test gate compiles + runs the crate
      # and builds the extension via uvx maturin into a hermetic uv venv.
      # Gated: python filter (which already subsumes rust) or CI tooling changed.
      - name: 'Spec 004 / I1: build extension + run pytest & cargo test'
        if: >-
          needs.changes.outputs.python == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- moon run ci:test-python
        env:
          CARGO_TERM_COLOR: always

  # ---------------------------------------------------------------------------
  # test-node — spec 005 (same review-I1 lesson): build the prompting-press-node
  # addon + the TS facade and run cargo test + the node:test suites. The `build`
  # matrix only `cargo build`s the workspace and never runs tests, so without this
  # job the 36 cargo + 57 TS tests — the only coverage for the Zod validate-at-render
  # path, the napi-error->Error-subclass decoder, loader parity, and composition —
  # can rot green. One Linux leg: the suites are OS-independent (the napi link itself
  # is covered per-OS by the `build` matrix). Verifying the addon LOADS on Linux is
  # the highest-probability surprise — this job catches it.
  #
  # Path-filter gating: setup steps always run; the heavy test step is gated on
  # node filter (which already subsumes rust) or CI tooling changes.
  # ---------------------------------------------------------------------------
  test-node:
    name: 'Node binding tests (ubuntu)'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # let moon resolve the base branch on pull_request events

      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          experimental: true

      - name: 'Cache pnpm + uv stores'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/uv
          key: pnpm-uv-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/uv.lock') }}
          restore-keys: |
            pnpm-uv-${{ runner.os }}-

      # Install the TS workspace deps (zod runtime + napi-cli/tsc) so the addon build
      # + node:test run hermetically against a pinned, frozen lockfile.
      - name: 'Install TS deps (pnpm)'
        run: mise exec -- pnpm -C packages/typescript install --frozen-lockfile

      - name: 'Expose Rust on PATH (for rust-cache)'
        shell: bash
        run: dirname "$(mise which cargo)" >> "$GITHUB_PATH"
      - name: 'Rust build cache'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: test-node-v2

      - name: 'Spec 005 / I1: build addon + run node:test & cargo test'
        if: >-
          needs.changes.outputs.node == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- moon run ci:test-node
        env:
          CARGO_TERM_COLOR: always

  # ---------------------------------------------------------------------------
  # conformance — spec 006 (FR-012 / FR-015): build both FFI bindings and run
  # all three conformance legs. The unique CI value is leg 1: cargo test -p
  # prompting-press --test conformance_marshaling --test conformance_schema —
  # the Rust consumer conformance tests that the OS-matrix `build` job never
  # runs. Legs 2 and 3 exercise only the two conformance files from the Python
  # and TS suites respectively (full suites covered by test-python/test-node).
  # One Linux leg: conformance correctness is OS-independent (link behavior is
  # covered per-OS by the `build` matrix).
  #
  # Path-filter gating: setup steps always run; the conformance step is gated
  # on rust, python, node, schema, or CI tooling changes.
  # ---------------------------------------------------------------------------
  conformance:
    name: 'Conformance corpus gate (ubuntu)'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # let moon resolve the base branch on pull_request events

      # Python is required for maturin develop (builds the prompting-press-py
      # extension into the hermetic venv in step 2 of conformance.sh).
      # Using the same version as the `build` matrix for consistency; abi3-py312
      # means any 3.12+ interpreter works — 3.12 matches the build job (floor
      # raised 3.10 -> 3.12 in spec 008).
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          experimental: true

      - name: 'Cache pnpm + uv stores'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/uv
          key: pnpm-uv-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/uv.lock') }}
          restore-keys: |
            pnpm-uv-${{ runner.os }}-

      # Install the TS workspace deps (zod runtime + napi-cli/tsc) so the addon
      # build in step 3 of conformance.sh runs hermetically against the pinned
      # frozen lockfile.
      - name: 'Install TS deps (pnpm)'
        run: mise exec -- pnpm -C packages/typescript install --frozen-lockfile

      - name: 'Expose Rust on PATH (for rust-cache)'
        shell: bash
        run: dirname "$(mise which cargo)" >> "$GITHUB_PATH"
      - name: 'Rust build cache'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: conformance-v2

      - name: 'Spec 006: conformance corpus gate (all three legs)'
        if: >-
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.python == 'true' ||
          needs.changes.outputs.node == 'true' ||
          needs.changes.outputs.schema == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- moon run ci:conformance
        env:
          CARGO_TERM_COLOR: always

  # ---------------------------------------------------------------------------
  # build — OS-sensitive: exercises FFI link paths per platform.
  #
  # Path-filter gating: setup steps always run; the cargo build step is gated on
  # rust or CI tooling changes. The 3-leg matrix always runs (all three Build
  # check names are required), but each leg finishes in ~1-2 min when the build
  # step is skipped (only setup overhead remains).
  # ---------------------------------------------------------------------------
  build:
    name: 'Build (${{ matrix.os }})'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [changes]
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # let moon resolve the base branch on pull_request events

      # Python is required before `cargo build` on Windows because pyo3's
      # abi3-py312 build script must locate a CPython installation to resolve the
      # Python import library for the cdylib link. On Linux/macOS the
      # `extension-module` feature + build.rs `-undefined dynamic_lookup` (macOS)
      # handle the link without a live Python interpreter, but Windows requires
      # the import lib. Installing Python on all legs is harmless (uniform CI).
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          experimental: true

      - name: 'Expose Rust on PATH (for rust-cache)'
        shell: bash
        run: dirname "$(mise which cargo)" >> "$GITHUB_PATH"
      - name: 'Rust build cache'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          # Per-OS cache (rust-cache already keys on the runner OS + rustc + lock).
          shared-key: build-v2

      - name: Build workspace
        if: >-
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- cargo build --workspace --locked
        env:
          CARGO_TERM_COLOR: always

  # ---------------------------------------------------------------------------
  # samples-test — spec 014 (WU-C / T021): build + test all three consumer
  # sample apps on their in-repo (path/workspace/editable) deps. A public-API
  # change an app consumes fails this gate, citing the app (SC-010). The three
  # legs span Rust/Python/TS, so this needs all three toolchains + the two built
  # FFI extensions. One Linux leg: the apps' behavior is OS-independent (the FFI
  # link itself is covered per-OS by the `build` matrix).
  #
  # Path-filter gating: setup steps always run; the samples:test step is gated
  # on rust, python, node, samples, or CI changes; the doc-samples step also
  # fires on docs changes (doc-sample programs live under docs/site/samples).
  # ---------------------------------------------------------------------------
  samples-test:
    name: 'Consumer sample apps (ubuntu)'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # let moon resolve the base branch on pull_request events

      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          experimental: true

      - name: 'Cache pnpm + uv stores'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/uv
          key: pnpm-uv-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/uv.lock') }}
          restore-keys: |
            pnpm-uv-${{ runner.os }}-

      # The Python + TypeScript sample apps consume the in-repo packages. The TS
      # sample depends on packages/typescript via a `file:` dep, so that package
      # must be FULLY built — the napi addon AND the TS facade (dist/index.js +
      # dist/index.d.ts, which the sample's tsc resolves via `main`/`types`).
      # `build` runs both build:addon + build:facade. The Python app's editable
      # install builds its extension via maturin during `uv sync`.
      - name: 'Install + build the TS package (addon + facade)'
        if: >-
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.python == 'true' ||
          needs.changes.outputs.node == 'true' ||
          needs.changes.outputs.samples == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: |
          mise exec -- pnpm -C packages/typescript install --frozen-lockfile
          mise exec -- pnpm -C packages/typescript run build

      - name: 'Expose Rust on PATH (for rust-cache)'
        shell: bash
        run: dirname "$(mise which cargo)" >> "$GITHUB_PATH"
      - name: 'Rust build cache'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: samples-test-v2

      - name: 'T021: samples:test (all three consumer apps)'
        if: >-
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.python == 'true' ||
          needs.changes.outputs.node == 'true' ||
          needs.changes.outputs.samples == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- moon run samples:test
        env:
          CARGO_TERM_COLOR: always

      # spec 014 — the in-page doc examples are standalone tested programs
      # (docs/site/samples/**), compiled + run here so a shown example that drifts
      # from the live API fails the PR citing the source file.
      # Also fires on docs changes: those programs live under docs/site/samples.
      - name: 'Doc-sample suites (docs:test-samples)'
        if: >-
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.python == 'true' ||
          needs.changes.outputs.node == 'true' ||
          needs.changes.outputs.samples == 'true' ||
          needs.changes.outputs.docs == 'true' ||
          needs.changes.outputs.ci == 'true' ||
          github.event_name == 'merge_group'
        run: mise exec -- moon run docs:test-samples
        env:
          CARGO_TERM_COLOR: always

  # Full-surface pre-release integration gate. Unlike samples-test (illustrative
  # apps), the integration harness exercises the ENTIRE public API surface of all
  # three packages as a real downstream consumer, one modular test file per feature
  # (construction, render, guard, derive+merge, provenance, loaders, compose, check,
  # errors, version). A public-API regression a consumer would hit fails here,
  # citing the language leg.
  #
  # Path-filter gating: this job is NOT a required status check, so a job-level
  # `if:` is safe — a "skipped" conclusion does not block the merge queue.
  # Runs when rust, python, node, or CI tooling changed, and always on merge_group.
  integration-test:
    name: 'Integration harness — full public surface (ubuntu)'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes]
    if: >-
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.node == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'merge_group'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # let moon resolve the base branch on pull_request events

      - name: Install mise toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          experimental: true

      - name: 'Cache pnpm + uv stores'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/uv
          key: pnpm-uv-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/uv.lock') }}
          restore-keys: |
            pnpm-uv-${{ runner.os }}-

      # The TypeScript harness depends on packages/typescript via a `file:` dep, so
      # that package must be FULLY built (napi addon + facade dist/) before the
      # harness resolves it. The integration:test-typescript leg also runs the
      # harness's own `pnpm test` (which rebuilds + refreshes the file-dep snapshot),
      # but pre-building here warms the cache and mirrors samples-test.
      - name: 'Install + build the TS package (addon + facade)'
        run: |
          mise exec -- pnpm -C packages/typescript install --frozen-lockfile
          mise exec -- pnpm -C packages/typescript run build

      - name: 'Expose Rust on PATH (for rust-cache)'
        shell: bash
        run: dirname "$(mise which cargo)" >> "$GITHUB_PATH"
      - name: 'Rust build cache'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: integration-test-v1

      - name: 'integration:test (full public surface, all three languages)'
        run: mise exec -- moon run integration:test
        env:
          CARGO_TERM_COLOR: always
