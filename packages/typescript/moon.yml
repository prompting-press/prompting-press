# moon.yml for prompting-press-typescript
# This is the packages/typescript project. Language is 'typescript'; the global
# all.yml tasks (cargo build/test) are excluded — they are Rust-only and
# would fail here.
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

workspace:
  inheritedTasks:
    exclude: ['build', 'test']

tasks:
  lint:
    description: 'Biome format + lint check on src/** and test/** (excludes src/generated/**).'
    command: 'pnpm -C packages/typescript check'
    inputs:
      - '/packages/typescript/src/**'
      - '/packages/typescript/test/**'
      - '/packages/typescript/biome.json'
    options:
      runFromWorkspaceRoot: true

  knip:
    description: 'Dead-code lint (TS) — knip flags unused files, exports, and dependencies in the facade. Config (knip.json) ignores the napi-generated loader (index.js) + the codegen shape (src/generated) + the per-platform optionalDependencies the loader references but the bundled build omits.'
    command: 'pnpm -C packages/typescript knip'
    inputs:
      - '/packages/typescript/src/**'
      - '/packages/typescript/test/**'
      - '/packages/typescript/knip.json'
      - '/packages/typescript/package.json'
    options:
      runFromWorkspaceRoot: true

  codegen:
    description: 'T026 — Regenerate TypeScript types from JSON Schema (FR-016).'
    command: 'pnpm -C packages/typescript codegen'
    inputs:
      - '/schemas/jsonschema/prompt-definition.schema.json'
      - '/packages/typescript/scripts/codegen.mjs'
      - '/mise.toml'
    outputs:
      - '/packages/typescript/src/generated/prompt-definition.ts'
    options:
      runFromWorkspaceRoot: true
